<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Cache Control - prevent stale HTML -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- Primary Meta Tags -->
    <title>Pumplo - Tvůj osobní tréningový průvodce</title>
    <meta name="description" content="Pumplo je tréninková appka, která ti pomůže dosáhnout tvých fitness cílů. Generuj personalizované tréninky a sleduj svůj pokrok." />
    <meta name="author" content="Pumplo" />
    
    <!-- Theme Color for PWA -->
    <meta name="theme-color" content="#4CC9FF" />
    <meta name="msapplication-TileColor" content="#4CC9FF" />
    
    <!-- Apple PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pumplo" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- Favicon — modern PNG preferred, legacy .ico fallback -->
    <link rel="icon" type="image/png" sizes="32x32" href="/pumplo-icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pumplo-icon-192.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pumplo - Tvůj osobní tréningový průvodce" />
    <meta property="og:description" content="Pumplo je tréninková appka, která ti pomůže dosáhnout tvých fitness cílů. Generuj personalizované tréninky a sleduj svůj pokrok." />
    <meta property="og:image" content="https://pumplo-nine.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pumplo - Tvůj osobní tréningový průvodce" />
    <meta name="twitter:description" content="Pumplo je tréninková appka, která ti pomůže dosáhnout tvých fitness cílů." />
    <meta name="twitter:image" content="https://pumplo-nine.vercel.app/og-image.png" />
    
    <!-- Mobile Specific -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
