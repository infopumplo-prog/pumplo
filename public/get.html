<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Stáhnout Pumplo</title>
  <meta name="description" content="Stáhni si Pumplo — tvůj digitální trenér." />
  <link rel="icon" href="/favicon.ico" />
  <style>
    :root { --navy:#0B1222; --navy2:#0f172a; --cyan:#4CC9FF; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html,body { margin:0; height:100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
      background: radial-gradient(800px 600px at 50% 0%, rgba(76,201,255,0.12), transparent 70%), var(--navy2);
      color:#fff; display:flex; align-items:center; justify-content:center; padding:24px; min-height:100%;
    }
    .card { width:100%; max-width:360px; text-align:center; }
    .logo { font-size:30px; font-weight:900; letter-spacing:-0.5px; }
    .logo span { color: var(--cyan); }
    .sub { color:#94a3b8; font-size:15px; margin:8px 0 28px; }
    .btns { display:flex; flex-direction:column; gap:12px; }
    a.store {
      display:flex; align-items:center; justify-content:center; gap:10px;
      text-decoration:none; font-weight:700; font-size:16px; border-radius:14px; padding:15px 18px;
      background:#fff; color:#0B1222; transition:transform .05s ease;
    }
    a.store:active { transform: scale(0.98); }
    a.store.alt { background: rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.15); }
    .hint { color:#64748b; font-size:12px; margin-top:22px; }
    .spin { margin:24px auto 0; width:26px; height:26px; border:3px solid rgba(255,255,255,0.15); border-top-color:var(--cyan); border-radius:50%; animation:r 0.8s linear infinite; }
    @keyframes r { to { transform: rotate(360deg); } }
    #choice { display:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Pump<span>lo</span></div>
    <p class="sub">Tvůj digitální trenér v posilovně</p>

    <div id="loading">
      <div class="spin"></div>
      <p class="hint">Přesměrováváme tě do obchodu…</p>
    </div>

    <div id="choice">
      <div class="btns">
        <a class="store" id="ios" href="https://apps.apple.com/app/pumplo/id6768619318"> Stáhnout pro iPhone (App Store)</a>
        <a class="store alt" id="android" href="https://play.google.com/store/apps/details?id=com.pumplo.app"> Stáhnout pro Android (Google Play)</a>
      </div>
      <p class="hint">Naskenuj tento QR kód telefonem.</p>
    </div>
  </div>

  <script>
    (function () {
      var APP_STORE = "https://apps.apple.com/app/pumplo/id6768619318";
      var PLAY = "https://play.google.com/store/apps/details?id=com.pumplo.app";
      var ua = navigator.userAgent || navigator.vendor || "";
      var isIOS = /iPhone|iPad|iPod/i.test(ua) ||
                  (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1); // iPadOS
      var isAndroid = /android/i.test(ua);

      if (isIOS) { location.replace(APP_STORE); return; }
      if (isAndroid) { location.replace(PLAY); return; }

      // Desktop / unknown → show both options
      document.getElementById("loading").style.display = "none";
      document.getElementById("choice").style.display = "block";
    })();
  </script>
</body>
</html>
