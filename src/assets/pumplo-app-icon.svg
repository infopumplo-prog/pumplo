<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1628"/>
      <stop offset="100%" stop-color="#050d1e"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Subtle top highlight -->
  <rect x="0" y="0" width="512" height="256" rx="115" fill="rgba(76,201,255,0.06)"/>
  <!-- Full Pumplo wordmark centered -->
  <text x="256" y="288" text-anchor="middle"
        font-family="'Nunito','Poppins','Rubik',system-ui,sans-serif"
        font-weight="900"
        font-size="108"
        letter-spacing="-5"
        fill="#4CC9FF">Pumplo</text>
</svg>
